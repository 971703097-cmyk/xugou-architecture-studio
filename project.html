<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project — Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body data-mode="minimal">

<div class="bg-layer" id="bgLayer"></div>

<div class="mode-indicator" id="modeIndicator">
  <span class="mode-dot"></span>
  <span class="mode-name" id="modeName">Minimal</span>
</div>

<div class="cmd-overlay" id="cmdOverlay">
  <div class="cmd-dialog">
    <div class="cmd-input-wrap">
      <svg class="cmd-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M11.5 11.5L14.5 14.5M13 7.5a5.5 5.5 0 11-11 0 5.5 5.5 0 0111 0z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <input class="cmd-input" id="cmdInput" type="text" placeholder="Type a mode..." autocomplete="off" spellcheck="false">
      <kbd class="cmd-kbd">esc</kbd>
    </div>
    <div class="cmd-results" id="cmdResults"></div>
  </div>
</div>

<header class="hd" id="hd">
  <div class="hd-inner">
    <a class='hd-logo' href='/' id='hdLogo'></a>
    <nav class="hd-nav">
      <a href='/' id='backLink'></a>
      <button class="cmd-trigger" id="cmdTrigger" title="Open command palette">
        <kbd class="cmd-trigger-kbd">\u2318K</kbd>
      </button>
    </nav>
  </div>
</header>

<article class="pg">
  <div class="pg-wrap">
    <a class='pg-back' href='/#works' id='pgBack'></a>
    <header class="pg-header">
      <div class="pg-meta" id="pgMeta"></div>
      <h1 class="pg-title" id="pgTitle"></h1>
    </header>
    <figure class="pg-hero-img" id="pgImg"></figure>
    <div class="pg-layout">
      <div class="pg-body" id="pgBody"></div>
      <aside class="pg-specs" id="pgSpecs"></aside>
    </div>
  </div>
</article>

<footer class="ft">
  <div class="ft-inner">
    <span class="ft-text" id="ftText"></span>
  </div>
</footer>

<!-- AI Command Bar -->
<div class="ai-bar" id="aiBar">
  <div class="ai-bar-inner">
    <svg class="ai-bar-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M2 4l6 4 6-4M2 4v8a1 1 0 001 1h10a1 1 0 001-1V4M2 4a1 1 0 011-1h10a1 1 0 011 1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <input class="ai-bar-input" id="aiInput" type="text" autocomplete="off" spellcheck="false">
    <kbd class="ai-bar-kbd">Enter</kbd>
  </div>
  <div class="ai-bar-toast" id="aiToast"></div>
</div>

<script src="script.js"></script>
<script>
(function() {
  const id = new URLSearchParams(location.search).get('id');
  fetch('data.json')
    .then(r => r.json())
    .then(data => {
      const p = data.projects[id];
      if (!p) { location.href = 'index.html'; return; }

      document.getElementById('hdLogo').textContent = data.studioName.en;
      document.getElementById('pgBack').innerHTML =
        `${data.sections.back.en}<span class="cn-inline">${data.sections.back.cn}</span>`;
      document.getElementById('pgMeta').innerHTML =
        `<span>${p.category.en}</span><span>${p.year}</span>`;
      document.getElementById('pgTitle').innerHTML =
        `<span class="en">${p.title.en}</span><span class="cn">${p.title.cn}</span>`;
      document.getElementById('pgImg').innerHTML =
        `<img src="${p.imageFull}" alt="${p.title.en}">`;
      document.getElementById('pgBody').innerHTML =
        `<p class="en">${p.detail.en}</p><p class="cn">${p.detail.cn}</p>`;
      if (p.specs) {
        document.getElementById('pgSpecs').innerHTML = p.specs.map(s =>
          `<div class="spec-item"><span class="spec-label">${s.label}</span><span class="spec-value">${s.value}</span></div>`
        ).join('');
      }
      document.getElementById('ftText').textContent =
        `\u00A9 ${new Date().getFullYear()} ${data.studioName.en}`;
      document.title = `${p.title.en} \u2014 ${data.studioName.en}`;

      const savedMode = sessionStorage.getItem('studio-mode') || 'minimal';
      document.body.dataset.mode = savedMode;
      if (window.__updateModeIndicator) window.__updateModeIndicator(savedMode, data);
      if (window.__initCommandPalette) window.__initCommandPalette(data);
      if (window.__initAiBar) window.__initAiBar(data);
    });
})();
</script>
</body>
</html>
