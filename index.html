<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio — Spatial Narrative</title>
<meta name="description" content="We design architecture not as pages, but as spatial sequences.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body data-mode="minimal">

<!-- Background Layer -->
<div class="bg-layer" id="bgLayer"></div>

<!-- Scene Progress -->
<nav class="scene-progress" id="sceneProgress"></nav>

<!-- Mode Indicator -->
<div class="mode-indicator" id="modeIndicator">
  <span class="mode-dot"></span>
  <span class="mode-name" id="modeName">Minimal</span>
</div>

<!-- Command Palette -->
<div class="cmd-overlay" id="cmdOverlay">
  <div class="cmd-dialog">
    <div class="cmd-input-wrap">
      <svg class="cmd-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M11.5 11.5L14.5 14.5M13 7.5a5.5 5.5 0 11-11 0 5.5 5.5 0 0111 0z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <input class="cmd-input" id="cmdInput" type="text" placeholder="Type a mode \u2014 minimal, editorial, compact..." autocomplete="off" spellcheck="false">
      <kbd class="cmd-kbd">esc</kbd>
    </div>
    <div class="cmd-results" id="cmdResults"></div>
  </div>
</div>

<!-- Header -->
<header class="hd" id="hd">
  <div class="hd-inner">
    <a class='hd-logo' href='/' id='hdLogo'></a>
    <nav class="hd-nav" id="hdNav">
      <button class="cmd-trigger" id="cmdTrigger" title="Open command palette">
        <span class="cmd-trigger-label">Modes</span>
        <kbd class="cmd-trigger-kbd">\u2318K</kbd>
      </button>
    </nav>
  </div>
</header>

<!-- Scene 1: Hero -->
<section class="scene scene-hero" id="hero" data-scene="hero">
  <div class="hero-parallax" id="heroParallax"></div>
  <div class="scene-inner">
    <h1 class="hero-h" id="heroH"></h1>
    <p class="hero-sub" id="heroSub"></p>
  </div>
  <div class="scene-scroll">
    <span>Scroll</span>
  </div>
</section>

<!-- Scene 2: Opening Statement -->
<section class="scene scene-statement" id="opening" data-scene="opening">
  <div class="scene-inner">
    <blockquote class="statement-lg" id="openingStatement"></blockquote>
  </div>
</section>

<!-- Scene 3: Works -->
<section class="scene scene-works" id="works" data-scene="works">
  <div class="scene-inner">
    <div class="sec-head" id="worksHead"></div>
    <div class="works-grid" id="workGrid"></div>
  </div>
</section>

<!-- Scene 4: Philosophy -->
<section class="scene scene-statement scene-philosophy" id="philosophy" data-scene="philosophy">
  <div class="scene-inner">
    <blockquote class="statement-lg" id="philosophyStatement"></blockquote>
  </div>
</section>

<!-- Scene 5: About -->
<section class="scene scene-about" id="about" data-scene="about">
  <div class="scene-inner">
    <div class="sec-head" id="aboutHead"></div>
    <div class="about-body" id="aboutBody"></div>
  </div>
</section>

<!-- Scene 6: Contact -->
<section class="scene scene-contact" id="contact" data-scene="contact">
  <div class="scene-inner">
    <div class="sec-head" id="contactHead"></div>
    <div class="contact-grid" id="contactGrid"></div>
    <footer class="scene-ft">
      <span id="ftLeft"></span>
      <span id="ftRight"></span>
    </footer>
  </div>
</section>

<!-- AI Command Bar -->
<div class="ai-bar" id="aiBar">
  <div class="ai-bar-inner">
    <svg class="ai-bar-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M2 4l6 4 6-4M2 4v8a1 1 0 001 1h10a1 1 0 001-1V4M2 4a1 1 0 011-1h10a1 1 0 011 1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <input class="ai-bar-input" id="aiInput" type="text" autocomplete="off" spellcheck="false">
    <kbd class="ai-bar-kbd">Enter</kbd>
  </div>
  <div class="ai-bar-toast" id="aiToast"></div>
</div>

<script src="script.js"></script>
</body>
</html>
