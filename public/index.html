<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Monograph - John Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="project-monograph.css">
</head>
<body>
<header class="mono-nav" id="monoNav">
  <a href="index.html" id="studioName">John Studio</a>
  <nav>
    <a href="#" id="nextProject">Next</a>
  </nav>
</header>

<main class="mono-page" id="monoPage">
  <section class="mono-hero">
    <img id="heroImage" src="" alt="">
    <div class="mono-hero-scrim"></div>
    <div class="mono-hero-copy reveal-now">
      <p id="heroMeta"></p>
      <h1 id="projectTitle"></h1>
    </div>
  </section>

  <section class="mono-intro reveal">
    <div class="mono-intro-meta" id="projectMeta"></div>
    <div class="mono-lead" id="projectLead"></div>
  </section>

  <section class="mono-image mono-image-large reveal">
    <img id="imageOne" src="" alt="">
  </section>

  <section class="mono-text-break reveal">
    <p id="chapterText"></p>
  </section>

  <section class="mono-spread reveal" id="imageSpread"></section>

  <section class="mono-notes reveal">
    <div>
      <span class="mono-label">Notes</span>
      <h2>Material, order, rhythm.</h2>
    </div>
    <div class="mono-note-list" id="projectNotes"></div>
  </section>

  <section class="mono-image mono-image-closing reveal">
    <img id="closingImage" src="" alt="">
  </section>

  <footer class="mono-footer reveal">
    <a href="index.html?id=0">First Project</a>
    <a href="#" id="nextProjectFooter">Next Project</a>
  </footer>
</main>

<script src="project-monograph.js"></script>
</body>
</html>
